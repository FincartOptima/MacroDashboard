<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Economic Pulse: Jan 2025 - May 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        .chart-container { position: relative; width: 100%; max-width: 900px; margin-left: auto; margin-right: auto; height: 50vh; max-height: 450px; }
        body { background-color: #FAFAFA; color: #333333; }
        .tab-btn.active { background-color: #1E3A8A; color: white; border-color: #1E3A8A; }
        .tab-btn { background-color: white; color: #4B5563; border-color: #D1D5DB; }
    </style>
</head>
<body class="font-sans antialiased leading-relaxed">

    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <span class="text-2xl font-bold text-blue-900">🇮🇳 EconPulse</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section id="overview" class="mb-12">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-4">Macroeconomic Indicators Dashboard</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="kpi-grid"></div>
        </section>

        <section id="trends" class="mb-16 bg-white p-6 rounded-xl shadow-md">
            <div class="flex flex-wrap gap-2 mb-6 justify-center">
                <button onclick="updateChart('gst')" id="btn-gst" class="tab-btn active border px-6 py-2 rounded-full font-medium">GST Collection</button>
                <button onclick="updateChart('credit')" id="btn-credit" class="tab-btn border px-6 py-2 rounded-full font-medium">Credit Growth</button>
                <button onclick="updateChart('inr')" id="btn-inr" class="tab-btn border px-6 py-2 rounded-full font-medium">USD/INR Rate</button>
            </div>
            <div class="chart-container"><canvas id="mainChart"></canvas></div>
        </section>

        <section id="data" class="mb-16">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Historical Data Table</h2>
            <div class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-200">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Month</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">GST (Lakh Cr)</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Credit (%)</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">USD/INR</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        Chart.register(ChartDataLabels);

        let economyData = [
            { month: "Jan 2025", gst: 1.75, credit: 15.2, inr: 83.15 },
            { month: "Feb 2025", gst: 1.68, credit: 15.4, inr: 83.20 },
            { month: "Mar 2025", gst: 1.80, credit: 15.8, inr: 83.25 },
            { month: "Apr 2025", gst: 2.15, credit: 16.0, inr: 83.35 },
            { month: "May 2025", gst: 1.85, credit: 15.9, inr: 83.40 },
            { month: "Jun 2025", gst: 1.78, credit: 15.6, inr: 83.50 },
            { month: "Jul 2025", gst: 1.82, credit: 15.5, inr: 83.55 },
            { month: "Aug 2025", gst: 1.75, credit: 15.2, inr: 83.60 },
            { month: "Sep 2025", gst: 1.80, credit: 15.4, inr: 83.70 },
            { month: "Oct 2025", gst: 1.90, credit: 15.7, inr: 83.65 },
            { month: "Nov 2025", gst: 1.85, credit: 15.8, inr: 83.80 },
            { month: "Dec 2025", gst: 1.80, credit: 15.6, inr: 83.85 },
            { month: "Jan 2026", gst: 1.88, credit: 15.9, inr: 83.90 },
            { month: "Feb 2026", gst: 1.82, credit: 16.0, inr: 83.95 },
            { month: "Mar 2026", gst: 1.95, credit: 16.2, inr: 84.00 },
            { month: "Apr 2026", gst: 2.25, credit: 16.3, inr: 84.10 },
            { month: "May 2026", gst: 1.92, credit: 16.1, inr: 84.05 }
        ];

        function renderAll() {
            const latest = economyData[economyData.length - 1];
            document.getElementById('kpi-grid').innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-orange-500">
                    <p class="text-xs text-gray-500 uppercase">GST</p>
                    <p class="text-3xl font-bold">₹${latest.gst} Cr</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-blue-600">
                    <p class="text-xs text-gray-500 uppercase">Credit Growth</p>
                    <p class="text-3xl font-bold">${latest.credit}%</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-green-500">
                    <p class="text-xs text-gray-500 uppercase">USD/INR</p>
                    <p class="text-3xl font-bold">${latest.inr}</p>
                </div>
            `;
            
            document.getElementById('data-table-body').innerHTML = economyData.map(d => `
                <tr>
                    <td class="px-6 py-4 text-sm">${d.month}</td>
                    <td class="px-6 py-4 text-right text-sm">${d.gst}</td>
                    <td class="px-6 py-4 text-right text-sm">${d.credit}%</td>
                    <td class="px-6 py-4 text-right text-sm">${d.inr}</td>
                </tr>
            `).join('');
        }

        const ctx = document.getElementById('mainChart').getContext('2d');
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: economyData.map(d => d.month), 
                datasets: [{ 
                    label: 'GST Collection', 
                    data: economyData.map(d => d.gst), 
                    backgroundColor: '#F97316' 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: { min: 1.6, max: 2.5, ticks: { stepSize: 0.1 } }
                },
                plugins: {
                    datalabels: { anchor: 'end', align: 'top', font: { size: 10, weight: 'bold' } }
                }
            }
        });

        window.updateChart = function(metric) {
            const config = { 
                gst: ['GST Collection', 'gst', '#F97316', 1.6, 2.5, 0.1], 
                credit: ['Credit Growth', 'credit', '#2563EB', 15.0, 17.0, 0.2], 
                inr: ['USD/INR Rate', 'inr', '#22C55E', 83.1, 85.3, 0.2] 
            };
            const [label, key, color, min, max, step] = config[metric];
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + metric).classList.add('active');
            
            window.myChart.data.datasets[0].data = economyData.map(d => d[key]);
            window.myChart.data.datasets[0].label = label;
            window.myChart.data.datasets[0].backgroundColor = color;
            window.myChart.options.scales.y.min = min;
            window.myChart.options.scales.y.max = max;
            window.myChart.options.scales.y.ticks.stepSize = step;
            window.myChart.update();
        };

        renderAll();
    </script>
</body>
</html>
